<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Applied Mathematics — Scenario Exam Prep</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@600;700;900&family=Inter:wght@400;500;600&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
  :root {
    --navy:    #0A1628;
    --navy2:   #112240;
    --navy3:   #1A3356;
    --gold:    #E8A020;
    --gold2:   #F5C842;
    --parch:   #F7F3ED;
    --parch2:  #EDE8E0;
    --red:     #C0392B;
    --green:   #1E8449;
    --blue:    #2471A3;
    --text:    #1C1C1E;
    --muted:   #6B7280;
    --border:  #D5CEC5;
  }

  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    background: var(--navy);
    color: var(--text);
    font-family: 'Inter', sans-serif;
    font-size: 15px;
    line-height: 1.6;
    min-height: 100vh;
  }

  /* ── HEADER ── */
  .site-header {
    background: linear-gradient(135deg, var(--navy) 0%, var(--navy3) 100%);
    padding: 48px 24px 36px;
    text-align: center;
    border-bottom: 3px solid var(--gold);
    position: relative;
    overflow: hidden;
  }
  .site-header::before {
    content: '';
    position: absolute; inset: 0;
    background: radial-gradient(ellipse 80% 60% at 50% 110%, rgba(232,160,32,0.12) 0%, transparent 70%);
    pointer-events: none;
  }
  .header-eyebrow {
    font-family: 'Inter', sans-serif;
    font-size: 11px;
    font-weight: 600;
    letter-spacing: 3px;
    text-transform: uppercase;
    color: var(--gold);
    margin-bottom: 14px;
  }
  .site-header h1 {
    font-family: 'Playfair Display', serif;
    font-size: clamp(28px, 5vw, 48px);
    font-weight: 900;
    color: #fff;
    line-height: 1.15;
    margin-bottom: 10px;
  }
  .site-header h1 span { color: var(--gold); }
  .header-sub {
    color: rgba(255,255,255,0.65);
    font-size: 14px;
    margin-bottom: 22px;
  }
  .uni-badges {
    display: flex;
    gap: 10px;
    justify-content: center;
    flex-wrap: wrap;
    margin-bottom: 28px;
  }
  .uni-badge {
    background: rgba(255,255,255,0.08);
    border: 1px solid rgba(232,160,32,0.4);
    color: var(--gold2);
    font-size: 11px;
    font-weight: 600;
    letter-spacing: 1px;
    padding: 5px 14px;
    border-radius: 20px;
  }

  /* ── PROGRESS OVERVIEW ── */
  .progress-bar-global {
    background: rgba(255,255,255,0.1);
    border-radius: 4px;
    height: 6px;
    width: min(400px, 90%);
    margin: 0 auto 6px;
    overflow: hidden;
  }
  .progress-bar-fill {
    height: 100%;
    background: linear-gradient(90deg, var(--gold), var(--gold2));
    border-radius: 4px;
    transition: width 0.4s ease;
    width: 0%;
  }
  .progress-label {
    color: rgba(255,255,255,0.5);
    font-size: 12px;
  }

  /* ── MAIN LAYOUT ── */
  .main {
    max-width: 860px;
    margin: 0 auto;
    padding: 40px 20px 80px;
  }

  /* ── CHAPTER BLOCKS ── */
  .chapter {
    margin-bottom: 32px;
    border-radius: 12px;
    overflow: hidden;
    box-shadow: 0 4px 24px rgba(0,0,0,0.35);
  }
  .chapter-header {
    background: var(--navy2);
    padding: 20px 24px;
    cursor: pointer;
    display: flex;
    align-items: center;
    gap: 16px;
    border: 1px solid rgba(255,255,255,0.07);
    border-bottom: none;
    border-radius: 12px 12px 0 0;
    user-select: none;
    transition: background 0.2s;
  }
  .chapter-header:hover { background: var(--navy3); }
  .chapter-header.open { border-bottom: 2px solid var(--gold); }
  .ch-num {
    font-family: 'Playfair Display', serif;
    font-size: 28px;
    font-weight: 900;
    color: var(--gold);
    line-height: 1;
    min-width: 44px;
  }
  .ch-info { flex: 1; }
  .ch-title {
    font-family: 'Playfair Display', serif;
    font-size: 18px;
    font-weight: 700;
    color: #fff;
    margin-bottom: 3px;
  }
  .ch-meta {
    display: flex;
    gap: 12px;
    align-items: center;
    flex-wrap: wrap;
  }
  .ch-count {
    font-size: 12px;
    color: rgba(255,255,255,0.45);
  }
  .ch-progress-pill {
    background: rgba(232,160,32,0.15);
    color: var(--gold2);
    font-size: 11px;
    font-weight: 600;
    padding: 2px 10px;
    border-radius: 10px;
    min-width: 70px;
    text-align: center;
  }
  .ch-arrow {
    color: rgba(255,255,255,0.35);
    font-size: 18px;
    transition: transform 0.3s;
    line-height: 1;
  }
  .chapter-header.open .ch-arrow { transform: rotate(180deg); color: var(--gold); }

  .chapter-body {
    background: var(--parch);
    display: none;
    border: 1px solid rgba(255,255,255,0.07);
    border-top: none;
    border-radius: 0 0 12px 12px;
  }
  .chapter-body.open { display: block; }

  /* ── TOPIC LABEL ── */
  .topic-label {
    background: var(--navy);
    color: var(--gold);
    font-size: 11px;
    font-weight: 600;
    letter-spacing: 2px;
    text-transform: uppercase;
    padding: 10px 24px;
    border-bottom: 1px solid var(--border);
  }

  /* ── SCENARIO CARD ── */
  .scenario-card {
    border-bottom: 1px solid var(--border);
  }
  .scenario-card:last-child { border-bottom: none; }

  .scenario-q {
    padding: 20px 24px 16px;
    cursor: pointer;
    display: flex;
    gap: 14px;
    align-items: flex-start;
    transition: background 0.15s;
    position: relative;
  }
  .scenario-q:hover { background: var(--parch2); }
  .scenario-q.revealed { background: #f0f8f2; }

  .q-num {
    font-family: 'JetBrains Mono', monospace;
    font-size: 11px;
    font-weight: 500;
    color: #fff;
    background: var(--red);
    border-radius: 4px;
    padding: 3px 7px;
    margin-top: 2px;
    min-width: 36px;
    text-align: center;
    flex-shrink: 0;
  }
  .scenario-q.revealed .q-num { background: var(--green); }

  .q-body { flex: 1; }
  .q-tags {
    display: flex;
    gap: 6px;
    flex-wrap: wrap;
    margin-bottom: 8px;
  }
  .q-tag {
    font-size: 10px;
    font-weight: 600;
    letter-spacing: 0.5px;
    padding: 2px 8px;
    border-radius: 4px;
    text-transform: uppercase;
  }
  .tag-maju   { background: #DBEAFE; color: #1D4ED8; }
  .tag-iba    { background: #FCE7F3; color: #9D174D; }
  .tag-ksbl   { background: #D1FAE5; color: #065F46; }
  .tag-calc   { background: #FEF3C7; color: #92400E; }
  .tag-theory { background: #EDE9FE; color: #5B21B6; }
  .tag-applied{ background: #FEE2E2; color: #991B1B; }

  .q-text {
    font-family: 'Playfair Display', serif;
    font-size: 15.5px;
    font-weight: 600;
    color: var(--navy);
    line-height: 1.5;
    margin-bottom: 6px;
  }
  .q-scenario-label {
    font-size: 11px;
    font-weight: 600;
    letter-spacing: 1px;
    color: var(--red);
    text-transform: uppercase;
    margin-bottom: 6px;
  }
  .reveal-hint {
    font-size: 11px;
    color: var(--muted);
    margin-top: 6px;
  }
  .scenario-q.revealed .reveal-hint { display: none; }

  /* ── ANSWER PANEL ── */
  .answer-panel {
    display: none;
    background: #f0f8f2;
    border-left: 4px solid var(--green);
    margin: 0 24px 20px 74px;
    border-radius: 0 8px 8px 0;
    padding: 16px 20px;
  }
  .answer-panel.open { display: block; }
  .ans-label {
    font-size: 11px;
    font-weight: 600;
    letter-spacing: 1.5px;
    text-transform: uppercase;
    color: var(--green);
    margin-bottom: 10px;
  }
  .ans-step {
    margin-bottom: 10px;
  }
  .ans-step-title {
    font-weight: 600;
    font-size: 13px;
    color: var(--navy);
    margin-bottom: 3px;
  }
  .ans-step-body {
    font-size: 14px;
    color: #2D4A2D;
    line-height: 1.65;
  }
  .ans-formula {
    background: var(--navy);
    color: var(--gold2);
    font-family: 'JetBrains Mono', monospace;
    font-size: 13px;
    padding: 10px 14px;
    border-radius: 6px;
    margin: 8px 0;
    overflow-x: auto;
    white-space: pre;
  }
  .ans-callout {
    background: #E8F5E9;
    border: 1px solid #A5D6A7;
    border-radius: 6px;
    padding: 10px 14px;
    font-size: 13px;
    color: #1B5E20;
    margin-top: 10px;
    line-height: 1.6;
  }
  .ans-callout strong { color: var(--green); }

  /* ── CHAPTER PROGRESS BAR ── */
  .ch-body-progress {
    background: var(--parch2);
    padding: 12px 24px;
    display: flex;
    align-items: center;
    gap: 14px;
    border-bottom: 1px solid var(--border);
  }
  .ch-prog-bar {
    flex: 1;
    height: 5px;
    background: var(--border);
    border-radius: 3px;
    overflow: hidden;
  }
  .ch-prog-fill {
    height: 100%;
    background: linear-gradient(90deg, var(--green), #52C880);
    border-radius: 3px;
    transition: width 0.4s ease;
    width: 0%;
  }
  .ch-prog-text {
    font-size: 12px;
    color: var(--muted);
    white-space: nowrap;
  }

  /* ── FOOTER ── */
  footer {
    text-align: center;
    padding: 24px;
    color: rgba(255,255,255,0.25);
    font-size: 12px;
  }

  @media (max-width: 600px) {
    .answer-panel { margin-left: 24px; }
    .ch-num { font-size: 22px; min-width: 36px; }
    .q-text { font-size: 14px; }
  }
</style>
</head>

// ── BUILD DOM ──────────────────────────────────────────────────────────────────
const app = document.getElementById('app');
let totalQ = 0, answeredQ = 0;

chapters.forEach((ch, ci) => {
  totalQ += ch.scenarios.length;

  const chEl = document.createElement('div');
  chEl.className = 'chapter';
  chEl.id = `ch-${ci}`;

  const header = document.createElement('div');
  header.className = 'chapter-header';
  header.innerHTML = `
    <div class="ch-num">${ch.num}</div>
    <div class="ch-info">
      <div class="ch-title">${ch.title}</div>
      <div class="ch-meta">
        <span class="ch-count">${ch.scenarios.length} scenario${ch.scenarios.length > 1 ? 's' : ''}</span>
        <span class="ch-progress-pill" id="pill-${ci}">0 / ${ch.scenarios.length} done</span>
      </div>
    </div>
    <div class="ch-arrow">▾</div>
  `;

  const body = document.createElement('div');
  body.className = 'chapter-body';

  // progress bar inside body
  const progRow = document.createElement('div');
  progRow.className = 'ch-body-progress';
  progRow.innerHTML = `
    <div class="ch-prog-bar"><div class="ch-prog-fill" id="cpf-${ci}"></div></div>
    <div class="ch-prog-text" id="cpt-${ci}">0 of ${ch.scenarios.length} reviewed</div>
  `;
  body.appendChild(progRow);

  ch.scenarios.forEach((sc, si) => {
    const qid = `q-${ci}-${si}`;

    if (si === 0 || ch.scenarios[si-1].topic !== sc.topic) {
      const tl = document.createElement('div');
      tl.className = 'topic-label';
      tl.textContent = sc.topic;
      body.appendChild(tl);
    }

    const card = document.createElement('div');
    card.className = 'scenario-card';

    const tagHTML = sc.tags.map(t => `<span class="q-tag tag-${t}">${t}</span>`).join('') +
      `<span class="q-tag tag-${sc.uni.toLowerCase().replace(' ','')}">${sc.uni}</span>`;

    const qDiv = document.createElement('div');
    qDiv.className = 'scenario-q';
    qDiv.id = qid;
    qDiv.innerHTML = `
      <div class="q-num">Q${si+1}</div>
      <div class="q-body">
        <div class="q-tags">${tagHTML}</div>
        <div class="q-scenario-label">▶ Scenario</div>
        <div class="q-text">${sc.q}</div>
        <div class="reveal-hint">Click to reveal solution →</div>
      </div>
    `;

    // Answer panel
    const aDiv = document.createElement('div');
    aDiv.className = 'answer-panel';
    aDiv.id = `a-${ci}-${si}`;

    let aHTML = `<div class="ans-label">✦ Step-by-Step Solution</div>`;
    sc.steps.forEach(step => {
      aHTML += `<div class="ans-step">
        <div class="ans-step-title">${step.title}</div>
        <div class="ans-step-body">${step.body.replace(/\n/g,'<br>')}</div>
      </div>`;
    });
    aHTML += `<div class="ans-formula">${sc.formula}</div>`;
    aHTML += `<div class="ans-callout"><strong>📌 Exam Note:</strong> ${sc.callout}</div>`;
    aDiv.innerHTML = aHTML;

    // Toggle logic
    let revealed = false;
    qDiv.addEventListener('click', () => {
      revealed = !revealed;
      aDiv.classList.toggle('open', revealed);
      qDiv.classList.toggle('revealed', revealed);
      updateProgress(ci, ch.scenarios.length);
    });

    card.appendChild(qDiv);
    card.appendChild(aDiv);
    body.appendChild(card);
  });

  // Chapter toggle
  header.addEventListener('click', () => {
    const isOpen = body.classList.contains('open');
    body.classList.toggle('open', !isOpen);
    header.classList.toggle('open', !isOpen);
  });

  chEl.appendChild(header);
  chEl.appendChild(body);
  app.appendChild(chEl);
});

function updateProgress(ci, total) {
  const revealed = document.querySelectorAll(`#ch-${ci} .scenario-q.revealed`).length;
  const pct = (revealed / total) * 100;
  document.getElementById(`cpf-${ci}`).style.width = pct + '%';
  document.getElementById(`cpt-${ci}`).textContent = `${revealed} of ${total} reviewed`;
  document.getElementById(`pill-${ci}`).textContent = `${revealed} / ${total} done`;
  if (revealed === total) {
    document.getElementById(`pill-${ci}`).style.background = 'rgba(30,132,73,0.25)';
    document.getElementById(`pill-${ci}`).style.color = '#52C880';
  }

  // global
  const allRevealed = document.querySelectorAll('.scenario-q.revealed').length;
  const gPct = (allRevealed / totalQ) * 100;
  document.getElementById('global-fill').style.width = gPct + '%';
  document.getElementById('global-label').textContent = `${allRevealed} of ${totalQ} scenarios reviewed`;
}

// Open first chapter by default
document.querySelector('.chapter-header').click();
</script>
